kind = "web"
previewPath = "/"
title = "NeoBank — Banque Premium"
version = "1.0.0"
id = "artifacts/neo-bank"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23880

[services.development]
run = "pnpm --filter @workspace/neo-bank run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neo-bank", "run", "build" ]
publicDir = "artifacts/neo-bank/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23880"
BASE_PATH = "/"
